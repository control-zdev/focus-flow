<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus-Flow Asset Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-family: sans-serif;
        background: #0f172a;
        color: #f8fafc;
        text-align: center;
        padding: 50px;
      }
      .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        display: inline-block;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .btn {
        background: #10b981;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #059669;
      }
      canvas {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Focus-Flow Icon Generator</h2>
      <p>
        Click the button below to generate and download your extension assets
        seamlessly.
      </p>
      <button class="btn" onclick="generateAssets()">
        Download Extension Icons
      </button>
    </div>

    <script>
      function generateAssets() {
        const sizes = [16, 48, 128];

        sizes.forEach((size) => {
          const canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext("2d");
          const scale = size / 128;

          // 1. Sleek, rounded dark square container
          ctx.fillStyle = "#0f172a";
          ctx.beginPath();
          ctx.roundRect(
            10 * scale,
            10 * scale,
            108 * scale,
            108 * scale,
            16 * scale
          );
          ctx.fill();

          // 2. Server tray backdrop gridlines
          ctx.strokeStyle = "#1e293b";
          ctx.lineWidth = 6 * scale;
          ctx.lineCap = "round";
          [42, 64, 86].forEach((y) => {
            ctx.beginPath();
            ctx.moveTo(32 * scale, y * scale);
            ctx.lineTo(96 * scale, y * scale);
            ctx.stroke();
          });

          // 3. High-performance pulse line (Neon Flow Green)
          ctx.strokeStyle = "#10b981";
          ctx.lineWidth = 7 * scale;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          ctx.beginPath();
          ctx.moveTo(28 * scale, 64 * scale);
          ctx.lineTo(48 * scale, 64 * scale);
          ctx.lineTo(56 * scale, 32 * scale);
          ctx.lineTo(64 * scale, 96 * scale);
          ctx.lineTo(72 * scale, 52 * scale);
          ctx.lineTo(78 * scale, 74 * scale);
          ctx.lineTo(84 * scale, 64 * scale);
          ctx.lineTo(100 * scale, 64 * scale);
          ctx.stroke();

          // 4. Online/Healthy status node indicator
          ctx.fillStyle = "#10b981";
          ctx.beginPath();
          ctx.arc(96 * scale, 42 * scale, 6 * scale, 0, 2 * Math.PI);
          ctx.fill();

          // Trigger an automated client-side browser download
          const link = document.createElement("a");
          link.download = `icon${size}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }
    </script>
  </body>
</html>
